name: release-production

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact full origin/main SHA already green in verify
        required: true
        type: string
      release_pass:
        description: Player-facing pass, for example PASS 58
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: atomic-acres-production-pages
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Capture release workflow start
        shell: bash
        run: echo "RELEASE_STARTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - run: npm ci --ignore-scripts
      - name: Validate immutable green main candidate
        run: node scripts/release/pipeline-guard.mjs release --source-sha "${{ inputs.source_sha }}" --pass "${{ inputs.release_pass }}"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Validate accepted requirement manifest
        run: node scripts/release/acceptance-gate.mjs --phase release --pass "${{ inputs.release_pass }}" --head "${{ inputs.source_sha }}" --output artifacts/pipeline/acceptance-coverage.json
      - name: Reproduce static release gates
        run: npm run verify:pass25a:core
      - name: Capture immutable production build timestamp
        shell: bash
        run: |
          released_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "VITE_RELEASED_AT=$released_at" >> "$GITHUB_ENV"
          echo "RELEASE_BUILT_AT=$released_at" >> "$GITHUB_ENV"
      - name: Build production bytes
        run: npm run build
      - name: Verify exact production bytes
        run: npm run verify:release-tree
      - name: Install topology browser
        run: npx playwright install --with-deps chromium
      - name: Stage isolated three-channel release topology
        run: |
          git fetch --no-tags origin gh-pages:refs/remotes/origin/gh-pages
          npm run stage:release-topology
          npm run verify:release-topology
          node scripts/qa/run-with-preview-server.mjs node scripts/qa/verify-release-topology-browser.mjs
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          RELEASE_PASS: ${{ inputs.release_pass }}
      - name: Configure release commit identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Configure authenticated Pages remote
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Publish complete exact dist snapshot
        run: npm run deploy:ci -- -m "${{ inputs.release_pass }} from ${{ inputs.source_sha }}"
      - name: Wait for exact Pages build
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          RELEASE_PASS: ${{ inputs.release_pass }}
        run: |
          set -euo pipefail
          pages_sha="$(git ls-remote origin refs/heads/gh-pages | cut -f1)"
          status="queued"
          build='{}'
          # Pages deployment can sit in GitHub's environment queue for more than
          # five minutes even after its build succeeds. Keep the exact-SHA guard,
          # but allow up to 20 minutes for that external queue to drain.
          for attempt in $(seq 1 120); do
            build="$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest")"
            build_sha="$(jq -r '.commit // empty' <<<"$build")"
            status="$(jq -r '.status // "unknown"' <<<"$build")"
            if [[ "$build_sha" == "$pages_sha" && "$status" == "built" ]]; then break; fi
            if [[ "$build_sha" == "$pages_sha" && "$status" == "errored" ]]; then exit 1; fi
            sleep 10
          done
          [[ "$(jq -r '.commit // empty' <<<"$build")" == "$pages_sha" && "$status" == "built" ]]
          mkdir -p artifacts/pipeline
          jq -n \
            --arg pagesSha "$pages_sha" \
            --arg status "$status" \
            --arg createdAt "$(jq -r '.created_at' <<<"$build")" \
            --arg updatedAt "$(jq -r '.updated_at' <<<"$build")" \
            '{schemaVersion:1, pagesSha:$pagesSha, status:$status, createdAt:$createdAt, updatedAt:$updatedAt}' \
            > artifacts/pipeline/pages-build.json
      - name: Verify canonical live release
        env:
          QA_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          QA_OUTPUT: artifacts/pipeline/live-release-smoke.json
          QA_SCREENSHOT_DIR: artifacts/pipeline/live-smoke
          SOURCE_SHA: ${{ inputs.source_sha }}
          RELEASE_PASS: ${{ inputs.release_pass }}
        run: node scripts/qa/verify-release-topology-browser.mjs
      - name: Write acceptance-bound production receipt and timings
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          RELEASE_PASS: ${{ inputs.release_pass }}
        run: node scripts/release/write-production-receipt.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-release-receipt-${{ inputs.source_sha }}
          path: artifacts/pipeline/**
          if-no-files-found: error
