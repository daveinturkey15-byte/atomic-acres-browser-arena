name: verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-change:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.impact.outputs.mode }}
      reason: ${{ steps.impact.outputs.reason }}
      windows_groups: ${{ steps.impact.outputs.windows_groups }}
      linux_groups: ${{ steps.impact.outputs.linux_groups }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify verification impact
        id: impact
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/release/change-impact.mjs --base "$BASE_SHA" --head "$HEAD_SHA"

  static-and-unit:
    needs: classify-change
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Cross-platform authoring command smoke
        run: node scripts/blender/run-authoring.mjs arena
        env:
          AUTHORING_DRY_RUN: "1"
      - run: npm run lint
      - run: npm run verify:gameplay-contract
      - run: npm run verify:provenance
      - run: npm test
      - run: npm run leaderboard:check
      - run: npm run build
      - run: npm run verify:release-tree
      - name: Write immutable PR preview receipt
        if: github.event_name == 'pull_request' && runner.os == 'Linux' && needs.classify-change.outputs.mode != 'none'
        run: node scripts/release/write-preview-receipt.mjs --head "${{ github.event.pull_request.head.sha }}" --pr "${{ github.event.pull_request.number }}"
      - name: Upload immutable PR preview
        if: github.event_name == 'pull_request' && runner.os == 'Linux' && needs.classify-change.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: |
            dist/
            artifacts/pipeline/pr-preview.json
            acceptance/pass-*.json
          if-no-files-found: error
          retention-days: 14
      - name: Production dependency audit
        if: runner.os == 'Linux'
        run: npm run audit:dependencies

  requirements-acceptance:
    needs: classify-change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify complete requirement-to-evidence coverage and exact preview approval
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          IMPACT: ${{ needs.classify-change.outputs.mode }}
        run: node scripts/release/acceptance-gate.mjs --phase ci --impact "$IMPACT" --base "$BASE_SHA" --head "$HEAD_SHA" --output artifacts/pipeline/acceptance-coverage.json
      - name: Upload acceptance coverage receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-coverage-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/pipeline/acceptance-coverage.json
          if-no-files-found: warn
          retention-days: 30

  bounded-browser-windows:
    needs: [classify-change, static-and-unit]
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Record browser gate decision
        run: echo "mode=${{ needs.classify-change.outputs.mode }} reason=${{ needs.classify-change.outputs.reason }}"
      - uses: actions/checkout@v4
        if: needs.classify-change.outputs.mode != 'none'
      - uses: actions/setup-node@v4
        if: needs.classify-change.outputs.mode != 'none'
        with:
          node-version: 22
          cache: npm
      - if: needs.classify-change.outputs.mode != 'none'
        run: npm ci --ignore-scripts
      - if: needs.classify-change.outputs.mode != 'none'
        run: npx playwright install chromium
      - if: needs.classify-change.outputs.mode != 'none'
        run: npm run build
      - if: needs.classify-change.outputs.mode != 'none'
        env:
          QA_E2E_GROUPS: ${{ needs.classify-change.outputs.windows_groups }}
        run: npm run test:e2e:bounded

  bounded-browser-linux:
    needs: [classify-change, static-and-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Record browser gate decision
        run: echo "mode=${{ needs.classify-change.outputs.mode }} reason=${{ needs.classify-change.outputs.reason }}"
      - uses: actions/checkout@v4
        if: needs.classify-change.outputs.mode != 'none'
      - uses: actions/setup-node@v4
        if: needs.classify-change.outputs.mode != 'none'
        with:
          node-version: 22
          cache: npm
      - if: needs.classify-change.outputs.mode != 'none'
        run: npm ci --ignore-scripts
      - if: needs.classify-change.outputs.mode != 'none'
        run: npx playwright install --with-deps chromium
      - if: needs.classify-change.outputs.mode != 'none'
        env:
          QA_E2E_GROUPS: ${{ needs.classify-change.outputs.linux_groups }}
        run: npm run test:e2e:bounded

  pipeline-metrics:
    if: always()
    needs: [classify-change, requirements-acceptance, static-and-unit, bounded-browser-linux, bounded-browser-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download acceptance receipt
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: acceptance-coverage-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/acceptance
      - name: Record workflow timing and acceptance metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/release/workflow-metrics.mjs --acceptance artifacts/acceptance/acceptance-coverage.json --output artifacts/pipeline/workflow-metrics.json
      - uses: actions/upload-artifact@v4
        with:
          name: pipeline-metrics-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/pipeline/workflow-metrics.json
          if-no-files-found: error
          retention-days: 90
