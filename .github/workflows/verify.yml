name: verify

on:
  push:
    branches: [main, "desky/**"]
  pull_request:

permissions:
  contents: read

jobs:
  static-and-unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Cross-platform authoring command smoke
        run: node scripts/blender/run-authoring.mjs arena
        env:
          AUTHORING_DRY_RUN: "1"
      - run: npm run lint
      - run: npm run verify:gameplay-contract
      - run: npm run verify:provenance
      - run: npm test
      - run: npm run leaderboard:check
      - run: npm run build
      - run: npm run verify:release-tree
      - name: Production dependency audit
        if: runner.os == 'Linux'
        run: npm run audit:dependencies

  bounded-browser-windows:
    needs: static-and-unit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install chromium
      - run: npm run build
      - run: npm run test:e2e:bounded
        env:
          QA_E2E_GROUPS: pass25a-capability-chromium,boot-and-authored

  bounded-browser-linux:
    needs: static-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:bounded
        env:
          QA_E2E_GROUPS: pass25a-baseline,pass25a-capability-chromium
